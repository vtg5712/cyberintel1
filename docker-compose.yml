version: "3.9"

services:
  # ─── Graph Database ───────────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: cyberintel-neo4j
    environment:
      NEO4J_AUTH: neo4j/investigation_secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - cyberintel-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "investigation_secret", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Message Queue ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cyberintel-redis
    ports:
      - "6379:6379"
    networks:
      - cyberintel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberintel-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - screenshots:/app/screenshots
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=investigation_secret
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TOR_PROXY=socks5://tor:9050
      - ANONYMIZATION_MODE=direct
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cyberintel-net

  # ─── Celery Worker ───────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberintel-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - screenshots:/app/screenshots
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=investigation_secret
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TOR_PROXY=socks5://tor:9050
      - ANONYMIZATION_MODE=direct
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cyberintel-net

  # ─── Celery Beat (Scheduler) ─────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberintel-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cyberintel-net

  # ─── Tor Proxy (Optional Anonymization) ──────────────────────
  tor:
    image: dperson/torproxy:latest
    container_name: cyberintel-tor
    ports:
      - "9050:9050"
      - "9051:9051"
    networks:
      - cyberintel-net

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberintel-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - cyberintel-net

volumes:
  neo4j_data:
  neo4j_logs:
  screenshots:

networks:
  cyberintel-net:
    driver: bridge
